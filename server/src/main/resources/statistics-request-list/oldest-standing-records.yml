queries:
  - showPositions: true
    keys:
      - World record
    positionTieBreakerIndex: 2
    headers:
      - Days
      - Event
      - Result
      - Type
      - Person
      - Competition
    sqlQuery: |-
      with
        current_single as (
          select
            *
          from
            results r
          where
            r.best > 0
            and regional_single_record = 'WR'
            and not exists (
              select
                1
              from
                results r2
              where
                r2.event_id = r.event_id
                and r2.best < r.best
                and r2.best > 0
                and r2.regional_single_record = 'WR'
            )
        ),
        current_average as (
          select
            *
          from
            results r
          where
            r.average > 0
            and regional_average_record = 'WR'
            and not exists (
              select
                1
              from
                results r2
              where
                r2.event_id = r.event_id
                and r2.average < r.average
                and r2.average > 0
                and r2.regional_average_record = 'WR'
            )
        ),
        combined_r as (
          select
            c.start_date,
            event_id,
            'Single' record_type,
            best record,
            person_id,
            r.person_name,
            c.id competition_id,
            c.name competition
          from
            current_single r
            inner join competitions c on r.competition_id = c.id
          union all
          select
            c.start_date,
            event_id,
            'Average' record_type,
            average record,
            person_id,
            r.person_name,
            c.id competition_id,
            c.name competition
          from
            current_average r
            inner join competitions c on r.competition_id = c.id
        )
      select
        datediff (current_date, start_date) days,
        e.name,
        wca_statistics_time_format (record, event_id, record_type) record,
        record_type,
        wca_statistics_person_link_format (person_id, person_name),
        wca_statistics_competition_link_format (competition_id, competition)
      from
        combined_r c
        inner join events e on c.event_id = e.id
      where
        e.`rank` < 900
      order by
        1 desc,
        event_id,
        record_type
      limit
        20
  - showPositions: true
    keys:
      - Continental record
    positionTieBreakerIndex: 2
    headers:
      - Days
      - Event
      - Result
      - Type
      - Region
      - Person
      - Competition
    sqlQuery: |-
      with
        current_single as (
          select
            r.*,
            c3.name region
          from
            results r
            inner join countries c on r.country_id = c.id
            inner join continents c3 on c.continent_id = c3.id
          where
            r.best > 0
            and regional_single_record is not null
            -- was a CR first
            and regional_single_record not in ('NR', 'WR')
            and not exists (
              select
                1
              from
                results r2
                inner join countries c2 on r2.country_id = c2.id
              where
                r2.event_id = r.event_id
                and r2.best < r.best
                and r2.best > 0
                and c.continent_id = c2.continent_id
            )
        ),
        current_average as (
          select
            r.*,
            c3.name region
          from
            results r
            inner join countries c on r.country_id = c.id
            inner join continents c3 on c.continent_id = c3.id
          where
            r.average > 0
            and regional_average_record is not null
            and regional_average_record not in ('NR', 'WR')
            and not exists (
              select
                1
              from
                results r2
                inner join countries c2 on r2.country_id = c2.id
              where
                r2.event_id = r.event_id
                and r2.average < r.average
                and r2.average > 0
                and c.continent_id = c2.continent_id
            )
        ),
        combined_r as (
          select
            c.start_date,
            event_id,
            'Single' record_type,
            region,
            best record,
            person_id,
            r.person_name,
            c.id competition_id,
            c.name competition
          from
            current_single r
            inner join competitions c on r.competition_id = c.id
          union all
          select
            c.start_date,
            event_id,
            'Average' record_type,
            region,
            average record,
            person_id,
            r.person_name,
            c.id competition_id,
            c.name competition
          from
            current_average r
            inner join competitions c on r.competition_id = c.id
        )
      select
        datediff (current_date, start_date) days,
        e.name,
        wca_statistics_time_format (record, event_id, record_type) record,
        record_type,
        region,
        wca_statistics_person_link_format (person_id, person_name),
        wca_statistics_competition_link_format (competition_id, competition)
      from
        combined_r c
        inner join events e on c.event_id = e.id
      where
        e.`rank` < 900
      order by
        1 desc,
        event_id,
        record_type
      limit
        20
  - showPositions: true
    keys:
      - National record
    positionTieBreakerIndex: 2
    headers:
      - Days
      - Event
      - Result
      - Type
      - Region
      - Person
      - Competition
    sqlQuery: |-
      with
        ordered_records as (
          select
            c.start_date,
            event_id,
            'Single' record_type,
            best record,
            person_id,
            r.person_name,
            c.id competition_id,
            c.name competition,
            r.country_id region,
            row_number() over (
              partition by
                event_id,
                r.country_id
              order by
                c.start_date desc
            ) rn
          from
            results r
            inner join competitions c on r.competition_id = c.id
          where
            regional_single_record = 'NR'
          union all
          select
            c.start_date,
            event_id,
            'Average' record_type,
            best record,
            person_id,
            r.person_name,
            c.id competition_id,
            c.name competition,
            r.country_id region,
            row_number() over (
              partition by
                event_id,
                r.country_id
              order by
                c.start_date desc
            ) rn
          from
            results r
            inner join competitions c on r.competition_id = c.id
          where
            regional_average_record = 'NR'
        ),
        current_records as (
          select
            *
          from
            ordered_records
          where
            rn = 1
        )
      select
        datediff (current_date, start_date) days,
        e.name,
        wca_statistics_time_format (record, event_id, record_type) record,
        record_type,
        region,
        wca_statistics_person_link_format (person_id, person_name),
        wca_statistics_competition_link_format (competition_id, competition)
      from
        current_records c
        inner join events e on e.id = c.event_id
      where
        e.rank < 900
      order by
        1 desc,
        e.rank
      limit
        20
